<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia</title>
    <link rel="stylesheet"href="STYLE.CSS">
</head>

  <header class="navbar">
 <div class="logo">🎬Cinévia</div>

</div>
   
       <nav class="menu">
        <a href="#Accueil">Accueil</a>
        <a href="#movies">Films</a>
        <a href="#favorites">Favoris</a>
    </nav>

            <div class="search-box">
        <input type="text" id="searchInput" placeholder="Recherche..."/>
    </div>
      </header>
  
    <section id="Accueil" class="hero">
        <div class="hero-content">
            <h1>Découvrez les meilleurs films 🎥</h1>
            <p>Explorez, recherchez et ajoutez vos films préférés</p>
             <button class="btn">Explorer maintenant</button>
        </div>
    </section>
  <div class="categories">
  <button class="active" data-cat="tous">Tous</button>
  <button data-cat="action">Action</button>
  <button data-cat="comédie">Comédie</button>
  <button data-cat="drame">Drame</button>
</div>
    <h2 class="title">Films populaires</h2>
    <div id ="movies" class="movies"></div>

<h4>Mes Favoris ❤️</h4>
<div id ="favorites" class="favorites"></div>

<footer class="footer">
  <p>© 2026 Cinevia - Tous droits réservés</p>
</footer>
<div class="overlay"></div>
<div class="popup-content">
  <span id="close">&times;</span>
  <img id="popup-img">
  <div class="popup-info">
    <h2 id="popup-title"></h2>
    <p class="popup-category" id="popup-category"></p>
    <p id="popup-desc"></p>
    <button class="fav-btn">❤️ Ajouter aux favoris</button>
  </div>
</div>
<script src="SCRIPT.JS"></script>
</body>
</html>
